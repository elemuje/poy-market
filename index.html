<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>PoY Market — Bitcoin-Native Yield NFT Marketplace</title>
    <meta name="description" content="Trade yield-bearing NFTs backed by real Bitcoin stakes. The first Bitcoin-native NFT marketplace on OP_NET." />
    <meta name="keywords" content="Bitcoin NFT, OP_NET, yield NFT, Bitcoin DeFi, PoY Protocol" />
    <meta name="author" content="PoY Protocol" />

    <!-- Open Graph -->
    <meta property="og:title" content="PoY Market — Bitcoin-Native Yield NFT Marketplace" />
    <meta property="og:description" content="Trade yield-bearing NFTs backed by real Bitcoin stakes on OP_NET." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://poymarket.com" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@PoYMarket" />
    <meta name="twitter:title" content="PoY Market" />
    <meta name="twitter:description" content="Bitcoin-Native Yield NFT Marketplace on OP_NET." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#08080F" />
    <meta name="color-scheme" content="dark" />

    <!-- Preconnect for Google Fonts (loaded in-app) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      /* Critical CSS — prevents flash of unstyled content */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        background: #08080F;
        color: #F0ECF8;
        font-family: system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      /* Loading spinner shown before React hydrates */
      #root:empty::after {
        content: '';
        display: block;
        width: 40px;
        height: 40px;
        border: 3px solid #FFFFFF10;
        border-top-color: #FF9F1C;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      @keyframes spin {
        to { transform: translate(-50%, -50%) rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
